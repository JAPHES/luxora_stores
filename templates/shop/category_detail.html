{% extends 'base.html' %}{% block content %}<section class="section-pad"><div class="container"><div class="section-heading">Category</div><h1 class="text-white">{{ category.name }}</h1><div class="row g-4 mt-2">{% for product in products %}<div class="col-md-4 col-lg-3"><div class="glass-card p-3 h-100"><h5 class="text-white">{{ product.name }}</h5><p class="text-light-emphasis small">{{ product.description|truncatechars:90 }}</p><a href="{{ product.get_absolute_url }}" class="btn btn-outline-light btn-sm">View</a></div></div>{% empty %}<div class="col-12"><div class="glass-card p-4 text-white-50">No products in this category.</div></div>{% endfor %}</div></div></section>{% endblock %}
