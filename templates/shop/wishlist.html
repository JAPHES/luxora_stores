{% extends 'base.html' %}{% block content %}<section class="section-pad"><div class="container"><div class="section-heading">Wishlist</div><h1 class="text-white mb-4">Your saved pieces</h1><div class="row g-4">{% for item in items %}<div class="col-md-6 col-lg-4"><div class="glass-card p-4 h-100"><h5 class="text-white">{{ item.product.name }}</h5><div class="text-light-emphasis">{{ item.product.category.name }}</div><a href="{{ item.product.get_absolute_url }}" class="btn btn-gold btn-sm mt-3">View Details</a></div></div>{% empty %}<div class="col-12"><div class="glass-card p-4 text-white-50">Your wishlist is empty.</div></div>{% endfor %}</div></div></section>{% endblock %}
