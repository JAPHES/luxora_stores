{% extends 'base.html' %}
{% block title %}Password Reset Successful | LLEXXI{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-overlay"></div>
    <div class="container position-relative py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-5">
                <div class="auth-card glass-card p-4 p-md-5 text-center">
                    <div class="mb-4">
                        <div class="success-icon mb-4">✓</div>
                        <h1 class="display-6 text-white fw-bold mb-2">Password Reset Successful</h1>
                    </div>
                    <p class="text-light-emphasis mb-4">
                        Your password has been successfully reset. You can now login with your new password.
                    </p>
                    <a href="{% url 'store:login' %}" class="btn btn-gold w-100 btn-lg">
                        <span>Login Now</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
